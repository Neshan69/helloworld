<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Kanchhi ko Bhatti</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="demo.css">
  <!-- EmailJS SDK -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    body {
      font-family: 'Montserrat', Arial, sans-serif;
      background: #FFF8F4;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background: #fff;
      box-shadow: 0 4px 18px rgba(58, 40, 20, 0.14);
      border-radius: 10px;
      padding: 2.1rem 1.5rem 1.6rem 1.5rem;
      max-width: 400px;
      width: 96%;
      margin: 2rem auto;
    }
    .login-container h2 {
      text-align: center;
      margin-bottom: 1.3rem;
      font-family: cursive;
      color: #B86B28;
      font-size: 1.45rem;
    }
    .login-form label {
      display: block;
      margin-bottom: 0.3rem;
      font-size: 1em;
      color: #37281D;
      font-weight: 500;
    }
    .login-form input[type="text"],
    .login-form input[type="password"] {
      width: 100%;
      padding: 0.64em 0.7em;
      margin-bottom: 1.06em;
      border: 1px solid #EDD5C0;
      border-radius: 6px;
      background: #F9EDE1;
      font-size: 1em;
      transition: border 0.18s;
      box-sizing: border-box;
    }
    .login-form input:focus {
      border-color: #B86B28;
      outline: none;
      background: #fff;
    }
    .login-form button {
      width: 100%;
      padding: 0.67em 0;
      background: #B86B28;
      color: #FFFDFB;
      border: none;
      border-radius: 6px;
      font-size: 1.07em;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 0.7em;
      transition: background 0.15s;
    }
    .login-form button:hover, .login-form button:focus {
      background: #7A401A;
    }
    .login-form .form-hint {
      text-align: center;
      font-size: 0.9em;
      color: #9B8577;
      margin-top: 0.85em;
    }
    .login-form .success-message {
      color: green;
      font-weight: bold;
      margin-top: 0.65em;
      text-align: center;
      display: none;
      padding: 0.5rem;
      background: #d4edda;
      border-radius: 4px;
    }
    .login-form .error-message {
      color: #B86B28;
      font-weight: bold;
      margin-top: 0.65em;
      text-align: center;
      display: none;
      padding: 0.5rem;
      background: #f8d7da;
      border-radius: 4px;
    }
    .demo-info {
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      text-align: center;
    }
    .demo-info strong {
      color: #B86B28;
    }
    .back-link {
      text-align: center;
      margin-top: 1rem;
    }
    .back-link a {
      color: #B86B28;
      text-decoration: none;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<!-- Preloader -->
<div id="preloader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FFF8F4; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;">
  <div style="text-align: center;">
    <!-- Spinning Tomato -->
    <img src="https://cdn-icons-png.flaticon.com/512/1202/1202125.png" alt="Tomato" style="width: 80px; height: 80px; animation: spin 1s linear infinite; margin-bottom: 20px;">
    <!-- Cafe Name -->
    <h1 style="font-family: cursive; color: #B86B28; font-size: 2rem; margin-bottom: 10px;">Kanchhi ko Bhatti</h1>
    <p style="color: #9B8577; font-size: 1.1rem;">कान्छीको भट्टी</p>
  </div>
</div>

<style>
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>

<script>
window.addEventListener('load', function() {
  setTimeout(function() {
    const preloader = document.getElementById('preloader');
    preloader.style.transition = 'opacity 0.5s';
    preloader.style.opacity = '0';
    setTimeout(function() {
      preloader.style.display = 'none';
    }, 500);
  }, 1500);
});
</script>

  <main>
    <div class="login-container">
      <h2>Welcome to Kanchhi ko Bhatti</h2>
      
      <!-- <div class="demo-info">
        <strong>Login Credentials:</strong><br>
        Username: <code>admin</code> | Password: <code>admin</code>
      </div> -->
      
      <form class="login-form" id="login-form" autocomplete="on">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" name="username" required placeholder="Enter username" autocomplete="username">

        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" required placeholder="Enter password" autocomplete="current-password">

        <button type="submit">Log In</button>
        
        <div class="success-message" id="success-message"></div>
        <div class="error-message" id="error-message"></div>
        
        <div class="back-link">
          <a href="index.html">← Back to Home</a>
        </div>
      </form>
    </div>
  </main>
  
  <script src="demo.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      
      const successMsg = document.getElementById('success-message');
      const errorMsg = document.getElementById('error-message');
      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';
      
      // Check credentials - both admin and user use admin/admin
      if (username === 'admin' && password === 'admin') {
        // Set as admin user
        currentUser = { username: 'admin', role: 'admin', name: 'Administrator' };
        sessionStorage.setItem('dom_current_user', JSON.stringify(currentUser));
        
        successMsg.textContent = "Login successful! Redirecting...";
        successMsg.style.display = 'block';
        
        setTimeout(function() {
          window.location.href = "admin.html";
        }, 1000);
      } else {
        errorMsg.textContent = "Invalid username or password.";
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
