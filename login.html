<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - DoM</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="demo.css">
  <style>
    body {
      font-family: var(--font, 'Montserrat', Arial, sans-serif);
      background: var(--bg, #FFF8F4);
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background: var(--surface, #fff);
      box-shadow: var(--shadow-md, 0 4px 18px rgba(58, 40, 20, 0.14));
      border-radius: var(--radius-md, 10px);
      padding: 2.1rem 1.5rem 1.6rem 1.5rem;
      max-width: 360px;
      width: 96%;
      margin: 2rem auto;
    }
    .login-container h2 {
      text-align: center;
      margin-bottom: 1.3rem;
      font-family: var(--font-logo, cursive);
      color: var(--primary, #B86B28);
      font-size: 1.45rem;
    }
    .login-form label {
      display: block;
      margin-bottom: 0.19em;
      font-size: var(--fs-sm,1em);
      color: var(--text, #37281D);
      font-weight: 500;
    }
    .login-form input[type="email"],
    .login-form input[type="password"],
    .login-form input[type="text"] {
      width: 100%;
      padding: 0.64em 0.7em;
      margin-bottom: 1.06em;
      border: 1px solid var(--border, #EDD5C0);
      border-radius: var(--radius-sm, 6px);
      background: var(--primary-light, #F9EDE1);
      font-size: 1em;
      transition: border var(--transition, 0.18s);
    }
    .login-form input:focus {
      border-color: var(--primary, #B86B28);
      outline: none;
      background: #fff;
    }
    .login-form button {
      width: 100%;
      padding: 0.67em 0;
      background: var(--primary, #B86B28);
      color: var(--text-on-primary, #FFFDFB);
      border: none;
      border-radius: var(--radius-sm, 6px);
      font-size: 1.07em;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 0.7em;
      transition: background 0.15s;
    }
    .login-form button:hover, .login-form button:focus {
      background: var(--primary-dark, #7A401A);
    }
    .login-form .form-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1em;
    }
    .promo-toggle {
      color: var(--accent, #3B8070);
      font-size: 0.98em;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      margin-bottom: 0.5em;
      margin-top: -0.6em;
      padding: 0;
      display: block;
      transition: color 0.18s;
    }
    .promo-toggle:hover {
      color: var(--primary, #B86B28);
    }
    .promo-area {
      display: none;
      margin-bottom: 1em;
      animation: fadeIn 0.49s;
    }
    .show-promo {
      display: block;
    }
    .login-form .form-hint {
      text-align: center;
      font-size: var(--fs-xs, 0.9em);
      color: var(--text-muted, #9B8577);
      margin-top: 0.85em;
    }
    .login-form .success-message {
      color: green;
      font-weight: bold;
      margin-top: 0.65em;
      text-align: center;
      display: none;
    }
    .login-form .error-message {
      color: #B86B28;
      font-weight: bold;
      margin-top: 0.65em;
      text-align: center;
      display: none;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px);}
      to { opacity: 1; transform: none;}
    }
  </style>
</head>
<body>
  <main>
    <div class="login-container">
      <h2>Welcome Back</h2>
      <form class="login-form" id="login-form" autocomplete="on">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" name="email" required placeholder="Eg: your@email.com" autocomplete="email">

        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" required placeholder="Your password" autocomplete="current-password">

        <button type="button" class="promo-toggle" id="promo-toggle-btn">Have a promo code?</button>
        <div class="promo-area" id="promo-area">
          <label for="promo-code">Promo Code</label>
          <input type="text" id="promo-code" name="promo" placeholder="Enter promo code">
        </div>

        <button type="submit">Log In</button>
        <div class="form-hint">
          Don't have an account?
          <a href="profile.html" style="color: var(--primary); text-decoration: underline;">Sign Up</a>
        </div>
        <div class="success-message" id="success-message">Login successful! Redirecting...</div>
        <div class="error-message" id="error-message">Invalid email or password.</div>
      </form>
    </div>
  </main>
  <script>
    document.getElementById('promo-toggle-btn').addEventListener('click', function() {
      const promoArea = document.getElementById('promo-area');
      promoArea.classList.toggle('show-promo');
    });

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      // Simple demo logic, replace with real authentication.
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const promo = document.getElementById('promo-code').value.trim();

      // Demo: Show success if email & password non-empty, else fail (for UX only!)
      const successMsg = document.getElementById('success-message');
      const errorMsg = document.getElementById('error-message');
      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';

      // Pretend to "check" login (always successful if not empty)
      if(email && password) {
        successMsg.textContent = "Login successful! ";
        if (promo) {
          successMsg.textContent += `Promo code "${promo}" applied.`;
        }
        successMsg.style.display = 'block';
        setTimeout(function() {
          window.location.href = "index.html"; // Redirect to home
        }, 1300);
      } else {
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
