<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Café Blog Portal | Kanchhi ko Bhatti</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- For demo, assuming demo.css (from your project) exists: -->
  <link rel="stylesheet" href="demo.css">
  <style>
    .blog-header {
      padding: 2.5rem 0 1.2rem;
      background: var(--primary-light, #F9EDE1);
      text-align: center;
    }
    .blog-header h1 {
      font-family: var(--font-logo, 'Pacifico', cursive);
      color: var(--primary, #B86B28);
      font-size: 2.6rem;
      margin-bottom: 0.2em;
    }
    .blog-header p {
      color: #715C41;
      font-size: 1.07rem;
      max-width: 530px;
      margin: 0 auto 1.2em;
    }
    .blog-main {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
      background: var(--surface, #fff);
      border-radius: var(--radius-sm, 6px);
      box-shadow: var(--shadow-md, 0 4px 18px rgba(58, 40, 20, 0.14));
      min-height: 480px;
    }
    .blog-list {
      margin: 0 0 2.6rem;
      padding: 0;
      list-style: none;
    }
    .blog-card {
      padding: 1.2rem 1rem 1.2rem 2.2rem;
      background: #FFF9F3;
      border-left: 5px solid var(--primary, #B86B28);
      margin-bottom: 1.3rem;
      box-shadow: 0 2px 9px rgba(188, 117, 45, 0.04);
      border-radius: var(--radius-sm, 6px);
      position: relative;
      cursor: pointer;
      transition: background 0.14s;
    }
    .blog-card:hover {
      background: #FFF5EA;
    }
    .blog-card-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text, #37281D);
    }
    .blog-card-meta {
      font-size: 0.89rem;
      color: var(--text-muted, #9B8577);
      margin: 0.26em 0 0.5em;
    }
    .blog-card-desc {
      font-size: 1rem;
      color: #6A5238;
      margin-bottom: 0;
    }
    .blog-remove-btn {
      position: absolute;
      top: 0.85rem;
      right: 1.1rem;
      background: #ffd1b7;
      color: #c95c1c;
      border: none;
      border-radius: 50%;
      width: 27px;
      height: 27px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.16rem;
      box-shadow: 0 2px 6px rgba(180,96,25,0.07);
      transition: background 0.13s, color 0.13s;
      opacity: 0.8;
    }
    .blog-remove-btn:hover {
      background: #ffc3a0;
      color: #7A401A;
      opacity: 1;
    }
    .blog-add-form {
      margin: 2.2rem 0 0;
      background: #FFF7EE;
      border-radius: var(--radius-sm, 6px);
      box-shadow: 0 1px 5px rgba(58, 40, 20, 0.07);
      padding: 1.5rem 1rem 1.5rem 1.5rem;
    }
    .blog-add-form label {
      font-weight: 500;
      color: var(--primary, #B86B28);
      margin-bottom: 0.4em;
    }
    .blog-add-form input, 
    .blog-add-form textarea {
      font-family: var(--font);
      width: 100%;
      font-size: 1rem;
      margin-bottom: 0.9em;
      padding: 0.6em 0.8em;
      border-radius: 5px;
      border: 1px solid #F3DFCF;
      background: #fff;
    }
    .blog-add-form textarea {
      min-height: 80px;
      resize: vertical;
    }
    .blog-add-form button {
      background: var(--primary, #B86B28);
      color: var(--text-on-primary, #FFFDFB);
      border: none;
      padding: 0.7em 1.75em;
      border-radius: 5px;
      font-weight: bold;
      font-size: 1.05rem;
      cursor: pointer;
      box-shadow: 0 1px 3px rgba(58,40,20,0.08);
      margin-top: 0.7em;
      transition: background 0.15s;
    }
    .blog-add-form button:hover {
      background: var(--primary-dark, #7A401A);
    }
    .blog-message {
      text-align: center;
      color: var(--primary, #B86B28);
      font-weight: 500;
      margin-bottom: 1em;
      display: none;
      animation: fadeIn 0.5s;
    }
    @media (max-width: 700px) {
      .blog-main {
        padding: 1.2rem 0.25rem 1.6rem;
      }
      .blog-add-form {
        padding: 1rem 0.5rem 1.4rem;
      }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px);}
      to { opacity: 1; transform: none;}
    }
  </style>
</head>
<body>
  <header class="blog-header">
    <h1>Café Blog Portal</h1>
    <p>Stories, recipes, events, and news from <b>Kanchhi ko Bhatti</b> — see what’s brewing in our community and share your voice!</p>
  </header>
  <main>
    <div class="blog-main">
      <ul class="blog-list" id="blog-list">
        <!-- Blog posts will appear here -->
      </ul>
      <section class="blog-add-form-section">
        <form class="blog-add-form" id="blog-add-form" autocomplete="off">
          <div class="blog-message" id="blog-message"></div>
          <h3 style="margin-bottom: 0.7em; color:var(--primary, #B86B28);">Share a New Post</h3>
          <label for="author">Your Name</label>
          <input type="text" id="author" name="author" placeholder="Eg: Sita K." maxlength="36" required>
          
          <label for="title">Post Title</label>
          <input type="text" id="title" name="title" placeholder="Eg: 5 Ways To Enjoy Mo:Mo At Home" maxlength="64" required>
          
          <label for="content">Post Content</label>
          <textarea id="content" name="content" placeholder="Tell us your story or recipe…" maxlength="4000" required></textarea>
          
          <button type="submit">Publish Post</button>
        </form>
      </section>
    </div>
  </main>
  <script>
    // — Mock demo for in-browser only. Posts will NOT persist after refresh! —
    const postsKey = 'kkb_blog_posts';
    const blogList = document.getElementById('blog-list');
    const form = document.getElementById('blog-add-form');
    const blogMsg = document.getElementById('blog-message');

    // Demo starter posts
    const starterPosts = [
      {
        id: Date.now() - 600000,
        title: "Our Farmers’ Market Debut!",
        author: "Bikash Lama",
        content: "We’re so grateful for your support at our first farmers’ market event! Serving hot sel roti and spiced masala chai brought so many smiles. See you next week at Jawalakhel ground!",
        date: "2024-06-09"
      },
      {
        id: Date.now() - 360000,
        title: "Sizzlin’ Summer: New Special Menu 🌶️",
        author: "Chef Kalpana",
        content: "Try our Savory Mango Lassi and Spiced Potato Choila Bowls, available all summer. Share your review in the comments below!",
        date: "2024-06-08"
      }
    ];

    // Util: Format date as YYYY-MM-DD
    function ymd(d) {
      return d.toISOString().slice(0, 10);
    }

    // Load posts from localStorage (demo), or starter data
    function getPosts() {
      let p = [];
      try {
        p = JSON.parse(localStorage.getItem(postsKey) || '[]');
      } catch {}
      if (!Array.isArray(p) || p.length === 0) {
        return starterPosts.slice();
      }
      return p;
    }

    function savePosts(posts) {
      try {
        localStorage.setItem(postsKey, JSON.stringify(posts));
      } catch {}
    }

    // Render
    function renderPosts(posts) {
      blogList.innerHTML = '';
      if (posts.length === 0) {
        blogList.innerHTML = '<li style="text-align:center;color:#a37a36;padding:2.5em 0">No blog posts yet. Be the first to post!</li>';
      } else {
        posts.slice().reverse().forEach(post => {
          const li = document.createElement('li');
          li.className = 'blog-card';
          li.tabIndex = 0;
          li.setAttribute('role', 'article');
          li.dataset.postId = post.id;
          li.innerHTML = `
            <div class="blog-card-title">${escapeHTML(post.title)}</div>
            <div class="blog-card-meta">by ${escapeHTML(post.author)} · <span>${post.date}</span></div>
            <div class="blog-card-desc">${escapeHTML(post.content).replace(/\n/g, '<br>')}</div>
            <button class="blog-remove-btn" title="Delete this blog post" aria-label="Remove post" type="button">&times;</button>
          `;
          blogList.appendChild(li);
        });
      }
    }

    // Helper: Soft simple XSS preventer
    function escapeHTML(s) {
      return s.replace(/[&<>"']/g,
        ch => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
        })[ch]
      );
    }

    // Initial render
    let posts = getPosts();
    renderPosts(posts);

    // Form submit
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const author = form.author.value.trim() || "Anonymous";
      const title = form.title.value.trim();
      const content = form.content.value.trim();
      if (!title || !content) {
        blogMsg.textContent = 'Title and content are required.';
        blogMsg.style.display = 'block';
        return;
      }
      if (title.length > 64) {
        blogMsg.textContent = 'Title too long!';
        blogMsg.style.display = 'block';
        return;
      }
      if (content.length > 4000) {
        blogMsg.textContent = 'Post is too long!';
        blogMsg.style.display = 'block';
        return;
      }
      const newPost = {
        id: Date.now(),
        title,
        content,
        author: author || 'Anonymous',
        date: ymd(new Date())
      };
      posts.push(newPost);
      savePosts(posts);
      renderPosts(posts);
      blogMsg.textContent = 'Your post has been published!';
      blogMsg.style.display = 'block';
      setTimeout(() => { blogMsg.style.display = 'none'; }, 1700);
      form.reset();
    });

    // Event delegation for removing a blog post
    blogList.addEventListener('click', function(e) {
      const btn = e.target.closest('.blog-remove-btn');
      if (!btn) return;
      const li = btn.closest('.blog-card');
      const postId = Number(li.dataset.postId);
      if (window.confirm('Are you sure you want to delete this post?')) {
        posts = posts.filter(post => post.id !== postId);
        savePosts(posts);
        renderPosts(posts);
        blogMsg.textContent = 'Post removed.';
        blogMsg.style.display = 'block';
        setTimeout(() => { blogMsg.style.display = 'none'; }, 1200);
      }
    });
  </script>
</body>
</html>
