  <script>
    // Email notification is not handled here - needs backend (e.g., emailjs, Formspree, etc.)
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Simple frontend validation already present via 'required'
      // Show success message and clear fields
      document.getElementById('successMsg').style.display = "block";
      setTimeout(function() {
        document.getElementById('successMsg').style.display = "none";
      }, 3000);
      this.reset();
    });
    // Set min date to today for date input (if not using PHP/SSR)
    document.addEventListener('DOMContentLoaded', function() {
      var dateField = document.getElementById('bookingDate');
      var today = new Date();
      var yyyy = today.getFullYear();
      var mm = String(today.getMonth()+1).padStart(2,'0');
      var dd = String(today.getDate()).padStart(2,'0');
      dateField.min = yyyy + '-' + mm + '-' + dd;
    });
  </script>
